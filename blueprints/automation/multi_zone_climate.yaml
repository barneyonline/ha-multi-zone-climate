blueprint:
  name: Dynamic Multi-Zone Climate Schedule (2025-06)
  description: >
    Computes a single global HVAC mode (heat/cool/dry/off) based on the most
    urgent zone need, applies it once to a shared climate head-unit, then
    staggers per-zone damper control by urgency. Optionally mirrors the target
    set temperature to additional per-zone climate entities. Respects manual
    overrides and uses hysteresis only for the stop point. Optionally gates on
    selected person entities being home.
  domain: automation
  # Avoid gating import on very new releases; keep broad compatibility
  # homeassistant:
  #   min_version: "2025.6.0"
  source_url: https://github.com/barneyonline/ha-multi-zone-climate/blob/main/blueprints/automation/multi_zone_climate.yaml

  input:
    start_time:
      name: Schedule Start Time
      selector: { time: {} }
    end_time:
      name: Schedule End Time
      selector: { time: {} }

    days:
      name: Active Days
      default: [mon, tue, wed, thu, fri, sat, sun]
      selector:
        select:
          multiple: true
          options:
            - {label: Monday,    value: mon}
            - {label: Tuesday,   value: tue}
            - {label: Wednesday, value: wed}
            - {label: Thursday,  value: thu}
            - {label: Friday,    value: fri}
            - {label: Saturday,  value: sat}
            - {label: Sunday,    value: sun}

    enabled_flag:
      name: Enable Automation
      selector: { entity: { domain: input_boolean } }

    manual_override:
      name: Manual Override Flag
      selector: { entity: { domain: input_boolean } }

    trigger_delay:
      name: Trigger Settle Delay
      description: Wait time after triggers fire before evaluating the manual override flag.
      default: 10
      selector: { number: { min: 0, max: 60, unit_of_measurement: "s" } }

    persons:
      name: Person(s) required to be home (optional)
      description: If set, at least one must be 'home' for the schedule to run. Leave empty to ignore presence.
      default: []
      selector:
        entity:
          domain: person
          multiple: true

    head_unit:
      name: Climate Head-Unit
      selector: { entity: { domain: climate } }

    allow_heat:
      name: Allow Heating Mode
      description: Toggle to permit automatic heating mode selection.
      default: true
      selector: { boolean: {} }

    allow_cool:
      name: Allow Cooling Mode
      description: Toggle to permit automatic cooling mode selection.
      default: true
      selector: { boolean: {} }

    allow_dry:
      name: Allow Dry Mode
      description: Toggle to permit automatic dehumidifying mode selection.
      default: true
      selector: { boolean: {} }

    control_head_unit:
      name: Control Head-Unit
      description: If disabled, the blueprint will not change the climate head-unit mode or temperature.
      default: true
      selector: { boolean: {} }

    control_dampers:
      name: Control Zone Dampers
      description: If disabled, damper switches will not be toggled.
      default: true
      selector: { boolean: {} }

    low_temp:
      name: Low Temperature Threshold
      description: Heating starts below this zone temperature. A typical value is 1°C below the head-unit heat setpoint.
      default: 20
      selector: { number: { min: 5, max: 30, unit_of_measurement: "°C" } }

    low_temp_input:
      name: Low Temperature Threshold Input Number (optional)
      description: If provided, overrides the Low Temperature Threshold number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    heat_set:
      name: Heat Setpoint
      description: Manual fallback used when no input_number override is selected below.
      default: 21
      selector: { number: { min: 10, max: 30, unit_of_measurement: "°C" } }

    heat_set_input:
      name: Heat Setpoint Input Number (optional)
      description: If provided, overrides the Heat Setpoint number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    high_temp:
      name: High Temperature Threshold
      description: Cooling starts above this zone temperature. A typical value is 1°C above the head-unit cool setpoint.
      default: 24
      selector: { number: { min: 15, max: 35, unit_of_measurement: "°C" } }

    high_temp_input:
      name: High Temperature Threshold Input Number (optional)
      description: If provided, overrides the High Temperature Threshold number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    cool_set:
      name: Cool Setpoint
      description: Manual fallback used when no input_number override is selected below.
      default: 23
      selector: { number: { min: 15, max: 35, unit_of_measurement: "°C" } }

    cool_set_input:
      name: Cool Setpoint Input Number (optional)
      description: If provided, overrides the Cool Setpoint number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    heat_hysteresis:
      name: Heat Hysteresis
      description: Extra temperature above the heat start threshold required before an active heating zone stops calling for heat.
      default: 0
      selector: { number: { min: 0, max: 5, step: 0.5, unit_of_measurement: "°C" } }

    cool_hysteresis:
      name: Cool Hysteresis
      description: Extra temperature below the cool start threshold required before an active cooling zone stops calling for cooling.
      default: 0
      selector: { number: { min: 0, max: 5, step: 0.5, unit_of_measurement: "°C" } }

    dry_hysteresis:
      name: Dry Hysteresis
      description: Extra humidity below the dry start threshold required before an active zone stops calling for dry mode.
      default: 0
      selector: { number: { min: 0, max: 20, step: 1, unit_of_measurement: "%" } }

    dry_temp:
      name: Dry-Mode Temperature Threshold
      description: Manual fallback used when no input_number override is selected below.
      default: 22
      selector: { number: { min: 5, max: 30, unit_of_measurement: "°C" } }

    dry_temp_input:
      name: Dry-Mode Temperature Threshold Input Number (optional)
      description: If provided, overrides the Dry-Mode Temperature Threshold number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    hum_high:
      name: High Humidity Threshold
      description: Manual fallback used when no input_number override is selected below.
      default: 60
      selector: { number: { min: 20, max: 100, unit_of_measurement: "%" } }

    hum_high_input:
      name: High Humidity Threshold Input Number (optional)
      description: If provided, overrides the High Humidity Threshold number selector.
      default: ""
      selector:
        entity:
          domain: input_number

    damper_delay:
      name: Damper Update Delay
      default: 10
      selector: { number: { min: 0, max: 60, unit_of_measurement: "s" } }

    update_interval:
      name: Update Interval
      description: How often to re-evaluate zones and update head unit/dampers.
      default: 1m
      selector:
        select:
          options:
            - { label: Every 1 minute,  value: 1m }
            - { label: Every 5 minutes, value: 5m }
            - { label: Every 10 minutes, value: 10m }
            - { label: Every 15 minutes, value: 15m }

    zone_temperature_entities:
      name: Zone Temperature Climate Entities (optional)
      description: Additional climate entities to keep aligned with a mode-adjusted zone target temperature. In heat mode the zone target is the head-unit setpoint plus the zone temperature offset. In cool mode it is the head-unit setpoint minus the offset. Entities that cannot accept the computed setpoint are skipped.
      default: []
      selector:
        entity:
          domain: climate
          multiple: true

    zone_temperature_offset:
      name: Zone Temperature Offset
      description: Amount added to the head-unit target in heat mode and subtracted in cool mode when updating zone temperature climate entities.
      default: 1
      selector: { number: { min: 0, max: 5, step: 0.5, unit_of_measurement: "°C" } }

    zones:
      name: Zones Configuration
      description: |
        Configure up to 8 zones. For each zone:
          – damper_switch (required)
          – one or more temperature sensors and/or humidity sensors.
        Optional per-zone overrides let you tailor thresholds if they differ from globals.
        You may also specify an input_boolean "enabled_flag" to dynamically enable or disable the zone.
      default:
        - name: Zone 1
          area: null
          damper_switch: ""
          enabled_flag: ""
          temp_sensors: []
          humidity_sensors: []
          low_temp: null
          high_temp: null
          dry_temp: null
          hum_high: null
      selector: { object: {} }

variables:
  persons: !input persons

trigger_variables:
  _interval: !input update_interval

triggers:
  - trigger: time
    at: !input start_time
  - trigger: time
    at: !input end_time
  # Recalculate regularly so zone dampers/head unit respond to sensor changes
  - trigger: time_pattern
    minutes: "/1"
    enabled: "{{ _interval == '1m' }}"
  - trigger: time_pattern
    minutes: "/5"
    enabled: "{{ _interval == '5m' }}"
  - trigger: time_pattern
    minutes: "/10"
    enabled: "{{ _interval == '10m' }}"
  - trigger: time_pattern
    minutes: "/15"
    enabled: "{{ _interval == '15m' }}"

actions:
  - variables:
      trigger_delay: !input trigger_delay

  - delay:
      seconds: "{{ trigger_delay | float(0) }}"

  - variables:
      days: !input days
      schedule_start: !input start_time
      schedule_end: !input end_time
      enabled_flag_entity: !input enabled_flag
      manual_override_entity: !input manual_override
      zones: !input zones

      low_static: !input low_temp
      low_entity: !input low_temp_input
      low: >-
        {% set entity = low_entity %}
        {% set fallback = low_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      high_static: !input high_temp
      high_entity: !input high_temp_input
      high: >-
        {% set entity = high_entity %}
        {% set fallback = high_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      dry_static: !input dry_temp
      dry_entity: !input dry_temp_input
      dry_t: >-
        {% set entity = dry_entity %}
        {% set fallback = dry_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      hum_static: !input hum_high
      hum_entity: !input hum_high_input
      hum_h: >-
        {% set entity = hum_entity %}
        {% set fallback = hum_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      heat_sp_static: !input heat_set
      heat_sp_entity: !input heat_set_input
      heat_sp: >-
        {% set entity = heat_sp_entity %}
        {% set fallback = heat_sp_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      cool_sp_static: !input cool_set
      cool_sp_entity: !input cool_set_input
      cool_sp: >-
        {% set entity = cool_sp_entity %}
        {% set fallback = cool_sp_static | float %}
        {% if entity in [none, '', []] %}
          {{ fallback }}
        {% else %}
          {{ states(entity) | float(default=fallback) }}
        {% endif %}

      heat_buf: !input heat_hysteresis
      cool_buf: !input cool_hysteresis
      dry_buf: !input dry_hysteresis
      head_entity: !input head_unit
      damper_delay: !input damper_delay
      allow_heat: !input allow_heat
      allow_cool: !input allow_cool
      allow_dry: !input allow_dry
      control_head: !input control_head_unit
      control_dampers: !input control_dampers
      zone_temp_entities: !input zone_temperature_entities
      zone_temp_offset: !input zone_temperature_offset
      current_hvac_mode: >-
        {% if head_entity in [none, '', []] %}
          none
        {% else %}
          {{ states(head_entity) }}
        {% endif %}

      presence_active: >-
        {% if persons | length > 0 %}
          {{ expand(persons) | selectattr('state','equalto','home') | list | count > 0 }}
        {% else %}
          true
        {% endif %}

      schedule_active: >-
        {% set selected_days = days if (days is list or days is tuple) else [days] %}
        {% set now_time = now().strftime('%H:%M:%S') %}
        {% set today = now().strftime('%a') | lower %}
        {% set yesterday = (now() - timedelta(days=1)).strftime('%a') | lower %}
        {% set today_key = today[:3] %}
        {% set yesterday_key = yesterday[:3] %}
        {% if schedule_start == schedule_end %}
          false
        {% elif schedule_start < schedule_end %}
          {{ today_key in selected_days and schedule_start <= now_time and now_time < schedule_end }}
        {% else %}
          {{ (today_key in selected_days and now_time >= schedule_start)
             or (yesterday_key in selected_days and now_time < schedule_end) }}
        {% endif %}

      automation_active: >-
        {{ is_state(enabled_flag_entity, 'on') and presence_active and schedule_active }}

      zone_data: >-
        {% set ns = namespace(out=[]) %}
        {% for z in zones %}
          {# Normalize sensors: allow single entity_id or list #}
          {% set t_ents = z.temp_sensors if (z.temp_sensors is list or z.temp_sensors is tuple) else ([z.temp_sensors] if (z.temp_sensors is defined and z.temp_sensors is not none and z.temp_sensors != '') else []) %}
          {% set h_ents = z.humidity_sensors if (z.humidity_sensors is list or z.humidity_sensors is tuple) else ([z.humidity_sensors] if (z.humidity_sensors is defined and z.humidity_sensors is not none and z.humidity_sensors != '') else []) %}
          {% set has_sensors = (t_ents | length > 0) or (h_ents | length > 0) %}

          {% set enabled = true %}
          {% if z.enabled_flag is defined and z.enabled_flag not in ['', none] %}
            {% set enabled = is_state(z.enabled_flag, 'on') %}
          {% endif %}

          {% if z.damper_switch %}
            {% set data = {
              'switch': z.damper_switch,
              'temp': none,
              'hum': none,
              'heat': 0,
              'cool': 0,
              'dry': 0,
              'urgency': 0
            } %}

            {% if enabled and has_sensors %}
              {% set damper_open = is_state(z.damper_switch, 'on') %}
              {% set t_vals = expand(t_ents)
                 | map(attribute='state')
                 | reject('in', ['unknown','unavailable','none','None','null'])
                 | map('float') | list %}
              {% set h_vals = expand(h_ents)
                 | map(attribute='state')
                 | reject('in', ['unknown','unavailable','none','None','null'])
                 | map('float') | list %}

              {% set temp = (t_vals | average(default=none)) %}
              {% set hum  = (h_vals | average(default=none)) %}

              {% set z_low    = (z.low_temp  | default(low,  true)) | float %}
              {% set z_high   = (z.high_temp | default(high, true)) | float %}
              {% set z_dry_t  = (z.dry_temp  | default(dry_t, true))| float %}
              {% set z_hum_h  = (z.hum_high  | default(hum_h, true))| float %}

              {% set hbuf = heat_buf | float(0) %}
              {% set cbuf = cool_buf | float(0) %}
              {% set dbuf = dry_buf  | float(0) %}

              {% set heat_start = z_low %}
              {% set heat_stop = z_low + hbuf %}
              {% set cool_start = z_high %}
              {% set cool_stop = z_high - cbuf %}
              {% set dry_start = z_hum_h %}
              {% set dry_stop = z_hum_h - dbuf %}

              {% set heat_active = current_hvac_mode == 'heat' and damper_open %}
              {% set cool_active = current_hvac_mode == 'cool' and damper_open %}
              {% set dry_active = current_hvac_mode == 'dry' and damper_open %}

              {% set heat_ref = heat_stop if heat_active else heat_start %}
              {% set cool_ref = cool_stop if cool_active else cool_start %}
              {% set dry_ref = dry_stop if dry_active else dry_start %}

              {% set heat_needed = allow_heat and temp is not none and (temp < heat_start or (heat_active and temp < heat_stop)) %}
              {% set heat_sc = (heat_ref - temp)
                 if heat_needed else 0 %}
              {% set cool_needed = allow_cool and temp is not none and (temp > cool_start or (cool_active and temp > cool_stop)) %}
              {% set cool_sc = (temp - cool_ref)
                 if cool_needed else 0 %}
              {% set dry_needed = allow_dry and hum is not none and temp is not none and temp > z_dry_t and (hum > dry_start or (dry_active and hum > dry_stop)) %}
              {% set dry_sc  = (hum - dry_ref)
                 if dry_needed else 0 %}
              {% set urg = [heat_sc, cool_sc, dry_sc] | max %}

              {% set data = {
                'switch': z.damper_switch,
                'temp': temp,
                'hum': hum,
                'heat': heat_sc,
                'cool': cool_sc,
                'dry': dry_sc,
                'urgency': urg
              } %}
            {% endif %}

            {% set ns.out = ns.out + [data] %}
          {% endif %}
        {% endfor %}
        {{ ns.out | sort(attribute='urgency', reverse=true) }}

      scores: >-
        {% set heats = zone_data | map(attribute='heat') | list %}
        {% set cools = zone_data | map(attribute='cool') | list %}
        {% set drys  = zone_data | map(attribute='dry')  | list %}
        {{ {
          "heat": (heats | default([0]) | max),
          "cool": (cools | default([0]) | max),
          "dry":  (drys  | default([0]) | max)
        } }}

      mode: >-
        {% set best = scores | dictsort(by='value', reverse=true) | first %}
        {{ best[0] if best and best[1] > 0 else 'off' }}

      zone_data_for_mode: >-
        {% if mode in ['heat', 'cool', 'dry'] %}
          {{ zone_data | sort(attribute=mode, reverse=true) }}
        {% else %}
          {{ zone_data }}
        {% endif %}

      set_temp: >-
        {% if mode == 'heat' %}{{ heat_sp | float(low) }}
        {% elif mode == 'cool' %}{{ cool_sp | float(high) }}
        {% else %}none{% endif %}

      zone_set_temp: >-
        {% if set_temp in [none, '', []] %}
          none
        {% else %}
          {% set offset = zone_temp_offset | float(0) %}
          {% if mode == 'heat' %}
            {{ (set_temp | float) + offset }}
          {% elif mode == 'cool' %}
            {{ (set_temp | float) - offset }}
          {% else %}
            none
          {% endif %}
        {% endif %}

      extra_temp_targets: >-
        {% set ns = namespace(ids=[]) %}
        {% set extras = zone_temp_entities if (zone_temp_entities is list or zone_temp_entities is tuple) else ([zone_temp_entities] if zone_temp_entities not in [none, '', []] else []) %}
        {% for entity in extras %}
          {% if entity not in [none, '', []] and entity != head_entity and entity not in ns.ids %}
            {% set ns.ids = ns.ids + [entity] %}
          {% endif %}
        {% endfor %}
        {{ ns.ids }}

      extra_temp_targets_to_update: >-
        {% if mode not in ['heat', 'cool'] or zone_set_temp in [none, '', []] %}
          []
        {% else %}
          {% set target = (zone_set_temp | float) | round(2) %}
          {% set ns = namespace(ids=[]) %}
          {% for entity in extra_temp_targets %}
            {% set current = state_attr(entity, 'temperature') %}
            {% set min_value = state_attr(entity, 'min_temp') | float(default=none) %}
            {% set max_value = state_attr(entity, 'max_temp') | float(default=none) %}
            {% set step = state_attr(entity, 'target_temp_step') | float(0) %}
            {% set step_ok = true %}
            {% if step > 0 %}
              {% set rounded = (((target / step) | round(0)) * step) | round(4) %}
              {% set step_ok = ((rounded - target) | abs) < 0.001 %}
            {% endif %}
            {% if (min_value is none or target >= min_value)
               and (max_value is none or target <= max_value)
               and step_ok
               and (current in [none, '', 'unknown', 'unavailable']
                 or ((current | float) | round(2)) != target) %}
              {% set ns.ids = ns.ids + [entity] %}
            {% endif %}
          {% endfor %}
          {{ ns.ids }}
        {% endif %}

      needs_mode_update: >-
        {% if mode in [none, '', []] %}
          false
        {% else %}
          {{ current_hvac_mode != mode }}
        {% endif %}

      head_needs_temp_update: >-
        {% if mode not in ['heat', 'cool'] %}
          false
        {% elif set_temp in [none, '', []] %}
          false
        {% elif head_entity in [none, '', []] %}
          false
        {% else %}
          {% set target = (set_temp | float) | round(2) %}
          {% set current = state_attr(head_entity, 'temperature') %}
          {% if current in [none, '', 'unknown', 'unavailable'] %}
            true
          {% else %}
            {{ (current | float) | round(2) != target }}
          {% endif %}
        {% endif %}

  - choose:
      - conditions: "{{ not automation_active }}"
        sequence:
          - choose:
              - conditions: "{{ control_head and head_entity not in [none, '', []] and current_hvac_mode != 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: !input head_unit
                    data:
                      hvac_mode: "off"

          - choose:
              - conditions: "{{ control_dampers }}"
                sequence:
                  - repeat:
                      for_each: "{{ zone_data }}"
                      sequence:
                        - variables:
                            current_open: "{{ is_state(repeat.item.switch, 'on') }}"
                        - choose:
                            - conditions: "{{ current_open }}"
                              sequence:
                                - if:
                                    - condition: template
                                      value_template: "{{ not repeat.first }}"
                                  then:
                                    - delay:
                                        seconds: "{{ damper_delay | int(0) }}"
                                - action: switch.turn_off
                                  continue_on_error: true
                                  target:
                                    entity_id: "{{ repeat.item.switch }}"

      - conditions: "{{ is_state(manual_override_entity, 'off') }}"
        sequence:
          - choose:
              - conditions: "{{ control_head }}"
                sequence:
                  - condition: state
                    entity_id: !input manual_override
                    state: "off"
                  - choose:
                      - conditions: "{{ needs_mode_update }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input head_unit
                            data:
                              hvac_mode: "{{ mode }}"
                  - choose:
                      - conditions: "{{ mode in ['heat', 'cool'] and needs_mode_update and set_temp not in [none, '', []] }}"
                        sequence:
                          - wait_template: "{{ states(head_entity) == mode }}"
                            timeout: "00:00:10"
                            continue_on_timeout: true
                  - condition: state
                    entity_id: !input manual_override
                    state: "off"
                  - choose:
                      - conditions: "{{ mode in ['heat', 'cool'] and set_temp not in [none, '', []] and states(head_entity) in ['heat', 'cool'] }}"
                        sequence:
                          - choose:
                              - conditions: "{{ head_needs_temp_update }}"
                                sequence:
                                  - action: climate.set_temperature
                                    target:
                                      entity_id: !input head_unit
                                    data:
                                      temperature: "{{ set_temp }}"
                                  - wait_template: >-
                                      {% set current = state_attr(head_entity, 'temperature') %}
                                      {{ current not in [none, '', 'unknown', 'unavailable']
                                         and ((current | float) | round(2)) == ((set_temp | float) | round(2)) }}
                                    timeout: "00:00:10"
                                    continue_on_timeout: true
                          - choose:
                              - conditions: "{{ extra_temp_targets_to_update | length > 0 }}"
                                sequence:
                                  - condition: state
                                    entity_id: !input manual_override
                                    state: "off"
                                  - action: climate.set_temperature
                                    continue_on_error: true
                                    target:
                                      entity_id: "{{ extra_temp_targets_to_update }}"
                                    data:
                                      temperature: "{{ zone_set_temp }}"

          - choose:
              - conditions: "{{ control_dampers }}"
                sequence:
                  - condition: state
                    entity_id: !input manual_override
                    state: "off"
                  - repeat:
                      for_each: "{{ zone_data_for_mode }}"
                      sequence:
                        - condition: state
                          entity_id: !input manual_override
                          state: "off"
                        - variables:
                            wants_open: >-
                              {{ (mode == 'heat' and repeat.item.heat > 0)
                                 or (mode == 'cool' and repeat.item.cool > 0)
                                 or (mode == 'dry' and repeat.item.dry > 0) }}
                            current_open: "{{ is_state(repeat.item.switch, 'on') }}"
                        - choose:
                            - conditions: "{{ wants_open and not current_open }}"
                              sequence:
                                - if:
                                    - condition: template
                                      value_template: "{{ not repeat.first }}"
                                  then:
                                    - delay:
                                        seconds: "{{ damper_delay | int(0) }}"
                                - condition: state
                                  entity_id: !input manual_override
                                  state: "off"
                                - action: switch.turn_on
                                  continue_on_error: true
                                  target:
                                    entity_id: "{{ repeat.item.switch }}"
                            - conditions: "{{ (not wants_open) and current_open }}"
                              sequence:
                                - if:
                                    - condition: template
                                      value_template: "{{ not repeat.first }}"
                                  then:
                                    - delay:
                                        seconds: "{{ damper_delay | int(0) }}"
                                - condition: state
                                  entity_id: !input manual_override
                                  state: "off"
                                - action: switch.turn_off
                                  continue_on_error: true
                                  target:
                                    entity_id: "{{ repeat.item.switch }}"

mode: queued
