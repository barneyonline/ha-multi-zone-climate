---
name: Validate Home Assistant blueprints

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'blueprints/**/*.ya?ml'
  push:
    branches:
      - main
    paths:
      - 'blueprints/**/*.ya?ml'

jobs:
  blueprint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Home Assistant Core
        env:
          HA_VERSION: '2025.6.0'
          HA_CONSTRAINTS: 'https://raw.githubusercontent.com/home-assistant/core/2025.6.0/homeassistant/package_constraints.txt'
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install \
            --constraint "${HA_CONSTRAINTS}" \
            "homeassistant==${HA_VERSION}"
          python - <<'PY'
          from importlib.metadata import version
          import sys
          print("HA OK", version("homeassistant"), sys.version)
          PY

      - name: Determine files to validate
        id: files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(
              git diff --name-only "${{ github.event.pull_request.base.sha }}" \
                                  "${{ github.sha }}" |
              grep -E '^blueprints/.*\.ya?ml$' || true
            )
            echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"
          else
            echo "files=blueprints/**/*.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate blueprints
        run: |
          FILES="${{ steps.files.outputs.files }}"
          python scripts/ha_blueprint_validate.py ${FILES:-blueprints/**/*.yaml}
